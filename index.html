    <title>Food World Cup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    <header>
        <h1>Food World Cup</h1>
    </header>
    <main>
        <h2 id="round-title">Round 1</h2>
        <div id="game-container">
            <div class="food-item" id="food-1">
                <img src="" alt="Food 1">
                <h3>Food 1</h3>
            </div>
            <div class="food-item" id="food-2">
                <img src="" alt="Food 2">
                <h3>Food 2</h3>
            </div>
        </div>
        <button id="next-round-btn" style="display: none;">Next Round</button>
    </main>
    <section id="comments">
